name: Release extension zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build zip
        run: npm run build

      - name: Create GitHub Release (if needed)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/randomify-chrome.zip
          generate_release_notes: true
